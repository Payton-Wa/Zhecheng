<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>贪吃蛇</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 16px;
      color: #4ecca3;
      letter-spacing: 4px;
    }

    #score-board {
      display: flex;
      gap: 40px;
      margin-bottom: 12px;
      font-size: 1rem;
      color: #aaa;
    }

    #score-board span {
      color: #4ecca3;
      font-weight: bold;
    }

    canvas {
      border: 2px solid #4ecca3;
      border-radius: 4px;
      background: #16213e;
      display: block;
    }

    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    #overlay h2 {
      font-size: 1.8rem;
      color: #e94560;
    }

    #overlay p {
      color: #aaa;
      font-size: 1rem;
    }

    button {
      margin-top: 8px;
      padding: 10px 32px;
      background: #4ecca3;
      color: #1a1a2e;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
    }

    button:hover { background: #38b08a; }

    #hint {
      margin-top: 12px;
      color: #555;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

<h1>贪吃蛇</h1>

<div id="score-board">
  得分：<span id="score">0</span>
  &nbsp;&nbsp;最高：<span id="best">0</span>
</div>

<div style="position:relative">
  <canvas id="canvas" width="400" height="400"></canvas>
  <div id="overlay">
    <h2 id="overlay-title">贪吃蛇</h2>
    <p id="overlay-msg">使用方向键控制蛇的移动</p>
    <button id="btn">开始游戏</button>
  </div>
</div>

<div id="hint">方向键 / WASD 控制 · 吃到食物得 1 分</div>

<script>
  const COLS = 20, ROWS = 20, CELL = 20;
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlayMsg = document.getElementById('overlay-msg');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const btn = document.getElementById('btn');

  let snake, dir, nextDir, food, score, best = 0, loopId;

  const DIRS = {
    ArrowUp:    { x: 0, y: -1 }, w: { x: 0, y: -1 },
    ArrowDown:  { x: 0, y:  1 }, s: { x: 0, y:  1 },
    ArrowLeft:  { x:-1, y:  0 }, a: { x:-1, y:  0 },
    ArrowRight: { x: 1, y:  0 }, d: { x: 1, y:  0 },
  };

  // 方向键映射（统一处理大小写）
  const keyMap = {
    ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 },
    w: { x: 0, y: -1 }, s: { x: 0, y: 1 },
    a: { x: -1, y: 0 }, d: { x: 1, y: 0 },
    W: { x: 0, y: -1 }, S: { x: 0, y: 1 },
    A: { x: -1, y: 0 }, D: { x: 1, y: 0 },
  };

  function randomFood() {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    return pos;
  }

  function startGame() {
    snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    scoreEl.textContent = 0;
    food = randomFood();
    overlay.style.display = 'none';
    clearInterval(loopId);
    loopId = setInterval(tick, 150);
  }

  function tick() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // 碰墙
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      return gameOver();
    }
    // 碰自身
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      return gameOver();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      if (score > best) { best = score; bestEl.textContent = best; }
      food = randomFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function gameOver() {
    clearInterval(loopId);
    overlayTitle.textContent = 'Game Over';
    overlayMsg.textContent = `得分：${score}`;
    btn.textContent = '再来一局';
    overlay.style.display = 'flex';
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 淡网格
    ctx.strokeStyle = '#1e2d4a';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= COLS; i++) {
      ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke();
    }
    for (let j = 0; j <= ROWS; j++) {
      ctx.beginPath(); ctx.moveTo(0, j * CELL); ctx.lineTo(canvas.width, j * CELL); ctx.stroke();
    }

    // 食物
    ctx.fillStyle = '#e94560';
    ctx.beginPath();
    ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
    ctx.fill();

    // 蛇身
    snake.forEach((seg, i) => {
      ctx.fillStyle = i === 0 ? '#4ecca3' : `rgba(78,204,163,${0.9 - i * 0.03})`;
      ctx.beginPath();
      ctx.roundRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, 3);
      ctx.fill();
    });

    // 蛇眼
    const ex = snake[0].x * CELL, ey = snake[0].y * CELL;
    ctx.fillStyle = '#1a1a2e';
    const eyeOffset = dir.x !== 0
      ? [{ dx: 4 + dir.x * 8, dy: 4 }, { dx: 4 + dir.x * 8, dy: 12 }]
      : [{ dx: 4, dy: 4 + dir.y * 8 }, { dx: 12, dy: 4 + dir.y * 8 }];
    eyeOffset.forEach(e => {
      ctx.beginPath();
      ctx.arc(ex + e.dx, ey + e.dy, 2, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  document.addEventListener('keydown', e => {
    const d = keyMap[e.key];
    if (!d) return;
    // 防止反向
    if (d.x === -dir.x && d.y === -dir.y) return;
    nextDir = d;
    e.preventDefault();
  });

  btn.addEventListener('click', startGame);

  // 初始画面
  draw();
</script>
</body>
</html>
